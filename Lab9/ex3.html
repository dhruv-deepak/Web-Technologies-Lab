<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Enrollment System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Course Enrollment</h2>

    <input type="text" id="courseName" placeholder="Course Name">
    <input type="text" id="instructor" placeholder="Instructor Name">
    <input type="number" id="seats" placeholder="Available Seats">

    <button onclick="enroll()">Enroll</button>

    <div class="result" id="output"></div>
</div>

<script>
    // ES6 Class
    class Course {
        constructor(courseName, instructor) {
            this.courseName = courseName;
            this.instructor = instructor;
        }

        displayCourse() {
            return `Course: ${this.courseName}, Instructor: ${this.instructor}`;
        }
    }

    function enroll() {
        const courseName = document.getElementById("courseName").value;
        const instructor = document.getElementById("instructor").value;
        const seats = Number(document.getElementById("seats").value);

        const course = new Course(courseName, instructor);

        // Promise
        const enrollCourse = new Promise((resolve, reject) => {
            setTimeout(() => {
                if (seats > 0) {
                    resolve("Enrollment Successful ✅");
                } else {
                    reject("Course Full ❌");
                }
            }, 1000);
        });

        enrollCourse
            .then(msg => {
                document.getElementById("output").innerHTML = `
                    ${course.displayCourse()} <br>
                    ${msg}
                `;
            })
            .catch(err => {
                document.getElementById("output").innerHTML = `
                    ${course.displayCourse()} <br>
                    ${err}
                `;
            });
    }
</script>

</body>
</html>
