<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Marks Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 25px 35px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            margin: 8px;
            padding: 8px;
            width: 200px;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Marks Calculator</h2>

    <input type="text" id="name" placeholder="Enter Name"><br>
    <input type="number" id="mark1" placeholder="Mark 1"><br>
    <input type="number" id="mark2" placeholder="Mark 2"><br>
    <input type="number" id="mark3" placeholder="Mark 3"><br>

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="output"></div>
</div>

<script>
    const calculateAverage = (m1, m2, m3) => {
        return (m1 + m2 + m3) / 3;
    };

    function calculate() {
        let studentName = document.getElementById("name").value;
        let mark1 = Number(document.getElementById("mark1").value);
        let mark2 = Number(document.getElementById("mark2").value);
        let mark3 = Number(document.getElementById("mark3").value);

        let total = mark1 + mark2 + mark3;
        let average = calculateAverage(mark1, mark2, mark3);

        document.getElementById("output").innerHTML = `
            Student Name: ${studentName} <br>
            Total Marks: ${total} <br>
            Average Marks: ${average.toFixed(2)}
        `;
    }
</script>

</body>
</html>
