<!DOCTYPE html>
<html>

<head>
<title>Online Book Finder</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select,button{
padding:8px;
margin:5px;
}

button{
background:#2b7cff;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1f5fd4;
}

.book{
background:#fafafa;
padding:15px;
border-radius:8px;
margin-top:10px;
border-left:5px solid #2b7cff;
}

</style>

</head>

<body>

<div class="container">

<h2>📚 Online Book Finder</h2>

<input id="searchTitle" placeholder="Search book title">
<button onclick="searchBook()">Search</button>

<br>

<select id="category">
<option value="">Select Category</option>
<option value="Programming">Programming</option>
<option value="Database">Database</option>
<option value="Web Development">Web Development</option>
<option value="Data Science">Data Science</option>
</select>

<button onclick="filterCategory()">Filter</button>

<br>

<button onclick="sortPrice()">Sort by Price</button>
<button onclick="sortRating()">Sort by Rating</button>
<button onclick="topBooks()">Top Rated</button>

<h3>Books</h3>

<div id="books"></div>

</div>

<script>

function displayBooks(data){

let html="";

data.forEach(book=>{

html+=`
<div class="book">
<h4>${book.title}</h4>
<b>Author:</b> ${book.author}<br>
<b>Category:</b> ${book.category}<br>
<b>Price:</b> ₹${book.price}<br>
<b>Rating:</b> ⭐ ${book.rating}
</div>
`;

});

document.getElementById("books").innerHTML=html;

}

function loadBooks(){

fetch("/books?page=1")
.then(res=>res.json())
.then(data=>displayBooks(data));

}

function searchBook(){

const title=document.getElementById("searchTitle").value;

fetch("/books/search?title="+title)
.then(res=>res.json())
.then(data=>displayBooks(data));

}

function filterCategory(){

const cat=document.getElementById("category").value;

fetch("/books/category/"+cat)
.then(res=>res.json())
.then(data=>displayBooks(data));

}

function sortPrice(){

fetch("/books/sort/price")
.then(res=>res.json())
.then(data=>displayBooks(data));

}

function sortRating(){

fetch("/books/sort/rating")
.then(res=>res.json())
.then(data=>displayBooks(data));

}

function topBooks(){

fetch("/books/top")
.then(res=>res.json())
.then(data=>displayBooks(data));

}

loadBooks();

</script>

</body>
</html>
